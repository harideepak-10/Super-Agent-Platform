[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn superagent.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/v1/auth/health/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.releaseCommand]]
command = "python manage.py migrate --noinput && python manage.py collectstatic --noinput"
